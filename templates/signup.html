<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Crear cuenta — Orbyte</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <div class="auth-card">
      <img src="/static/logo-full.png" alt="Orbyte" class="auth-logo">
      <p class="auth-subtitle">Tu cuenta quedará pendiente de aprobación por el administrador.</p>

      {% if error %}
      <div class="auth-notice auth-notice-error">{{ error }}</div>
      {% endif %}

      <form method="POST" class="auth-form">
        <label class="auth-label" for="signup-email">Correo</label>
        <input type="email" id="signup-email" name="email" class="auth-input" required autocomplete="email" autofocus>
        <label class="auth-label" for="signup-password">Contraseña</label>
        <input type="password" id="signup-password" name="password" class="auth-input" required autocomplete="new-password" minlength="8">
        <span class="auth-hint">Mínimo 8 caracteres.</span>
        <label class="auth-label" for="signup-password2">Repetir contraseña</label>
        <input type="password" id="signup-password2" name="password2" class="auth-input" required autocomplete="new-password" minlength="8">
        <button type="submit" class="track-btn primary auth-submit">Crear cuenta</button>
      </form>

      <div class="auth-footer">¿Ya tienes cuenta? <a href="/login">Iniciar sesión</a></div>
    </div>
  </div>
</body>
</html>
